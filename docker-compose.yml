version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peak
    ports:
      - '5432:5432'
    volumes:
      - peak_db_data:/var/lib/postgresql/data

volumes:
  peak_db_data:
